name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Lint
        run: uv run --extra dev ruff check .

      - name: Type check
        run: uv run --extra dev mypy src/tropical_mcp

      - name: Run tests
        run: uv run --extra dev pytest -q

      - name: Build package
        run: uv build

      - name: Installed wheel validation
        run: ./scripts/validate_installed_wheel.sh

      - name: Functional validation
        run: uv run tropical-mcp-full-validate

      - name: Replay CLI smoke
        run: uv run tropical-mcp-replay --fractions 1.0 --policies recency,l2_guarded --k 3 --line-count 80 --output-dir artifacts/ci-replay

      - name: Compatibility alias smoke
        run: |
          uv run tropical-compactor-replay --fractions 1.0 --policies recency --k 1 --line-count 40 --output-dir artifacts/ci-compat-replay
          uv run tropical-compactor-full-validate > /dev/null

  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --extra dev pytest -q
